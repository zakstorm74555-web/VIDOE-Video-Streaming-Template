      <style>
         body, #wrapper { background-color: #0f0f0f !important; color: #f1f1f1 !important; font-family: 'Segoe UI', Roboto, sans-serif; }
         
         .osahan-nav { background-color: rgba(15, 15, 15, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 1px solid #222 !important; }
         .navbar-brand { color: #fff !important; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
         .navbar-brand img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #FFD700; }
         .form-control { background-color: #121212 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 20px 0 0 20px !important; padding-left: 20px; }
         .form-control:focus { border-color: #FFD700 !important; box-shadow: none !important; }
         .input-group-append .btn { background-color: #222 !important; border: 1px solid #333 !important; color: #aaa !important; border-radius: 0 20px 20px 0 !important; border-left: none !important; }
         
         .sidebar { background-color: #0f0f0f !important; border-right: 1px solid #222 !important; }
         .sidebar .nav-item .nav-link { color: #aaa !important; font-size: 15px; font-weight: 500; padding: 12px 20px !important; }
         .sidebar .nav-item .nav-link:hover { color: #fff !important; background-color: #222 !important; border-radius: 8px; margin: 0 10px; }
         .sidebar .nav-item.active .nav-link { color: #FFD700 !important; font-weight: 700; background-color: #1a1a1a !important; border-radius: 8px; margin: 0 10px; }
         .sidebar .nav-item .nav-link i { font-size: 18px; margin-right: 15px; }
         
         #content-wrapper { background-color: #0f0f0f !important; padding-top: 20px; }
         hr { border-top: 1px solid #222 !important; }
         .main-title h6 { color: #fff !important; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
         
         .video-card { background: transparent !important; border: none !important; transition: transform 0.2s; cursor: pointer; }
         .video-card:hover { transform: translateY(-4px); }
         .video-card-image { border-radius: 12px !important; overflow: hidden; position: relative; aspect-ratio: 16/9; background: #222; }
         .video-card-image video, .video-card-image img { width: 100%; height: 100%; object-fit: cover; }
         .time { background: rgba(0,0,0,0.8) !important; color: #fff !important; font-weight: 600; border-radius: 4px !important; padding: 2px 6px !important; bottom: 8px !important; right: 8px !important; pointer-events: none;}
         
         .video-card-body { padding: 12px 0 0 0 !important; }
         .video-title a { color: #f1f1f1 !important; font-weight: 600 !important; font-size: 16px !important; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
         .video-page { color: #aaa !important; font-size: 14px !important; margin-top: 5px; display: flex; align-items: center; gap: 8px; }
         .video-view { color: #888 !important; font-size: 13px !important; margin-top: 2px; }
         
         .category-item { background: #1a1a1a !important; border: 1px solid #333 !important; border-radius: 12px !important; transition: 0.3s; }
         .category-item:hover { border-color: #FFD700 !important; }
         .category-item h6 { color: #fff !important; }
         .category-item p { color: #aaa !important; }
         
         ::-webkit-scrollbar { width: 8px; }
         ::-webkit-scrollbar-track { background: #0f0f0f; }
         ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
         ::-webkit-scrollbar-thumb:hover { background: #555; }
         
         .loading-spinner { color: #FFD700; font-size: 24px; text-align: center; width: 100%; padding: 40px; }
      </style>
